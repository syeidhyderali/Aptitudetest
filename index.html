<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Test For Admission | 80 MCQs | 60 min</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #eef2f7;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    /* Pre-quiz form */
    .pre-quiz {
      padding: 30px;
    }
    .pre-quiz h1 {
      text-align: center;
      color: #1a3c5e;
      margin-bottom: 10px;
    }
    .pre-quiz p {
      text-align: center;
      margin-bottom: 25px;
      color: #555;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #2c3e66;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #bdc4d0;
      border-radius: 12px;
      font-size: 16px;
    }
    .start-btn {
      background: #1e6f3f;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 40px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    .start-btn:hover { background: #0f5430; }
    /* Quiz area (hidden initially) */
    .quiz-area {
      display: none;
    }
    .header {
      background: #1a3c5e;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .timer {
      font-size: 36px;
      font-weight: bold;
      background: #e67e22;
      display: inline-block;
      padding: 8px 28px;
      border-radius: 60px;
      margin-top: 12px;
    }
    .student-info-bar {
      background: #e9edf2;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 14px;
      border-bottom: 1px solid #ccc;
    }
    .section {
      background: #f9fafc;
      margin: 24px;
      padding: 20px;
      border-radius: 20px;
      border-left: 6px solid #1a3c5e;
    }
    .section h2 {
      margin-top: 0;
      color: #1a3c5e;
    }
    .question {
      background: white;
      margin: 20px 0;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .question p {
      font-weight: 600;
      margin-bottom: 12px;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-left: 16px;
    }
    .options label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .submit-btn {
      background: #2c7da0;
      color: white;
      border: none;
      width: 80%;
      margin: 20px auto 40px;
      display: block;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
    }
    .submit-btn:hover { background: #1f5e7a; }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #6c757d;
      border-top: 1px solid #dee2e6;
    }
    @media (max-width: 700px) {
      .options { flex-direction: column; gap: 10px; }
      .timer { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- PRE-QUIZ SECTION -->
  <div id="preQuizSection" class="pre-quiz">
    <h1>🌍 Global Aptitude Test</h1>
    <p>80 questions | 60 minutes | 8 sections</p>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="studentName" placeholder="e.g., Maria Gonzalez" required>
    </div>
    <div class="form-group">
      <label>Date of Birth *</label>
      <input type="date" id="studentDob" required>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" id="studentEmail" placeholder="maria@example.com" required>
    </div>
    <div class="form-group">
      <label>Student Counselor *</label>
      <select id="studentCounselor" required>
        <option value="">-- Select --</option>
        <option value="Dr. Emily Roberts">Dr. Emily Roberts</option>
        <option value="Mr. James Chen">Mr. James Chen</option>
        <option value="Ms. Fatima Al-Mansouri">Ms. Fatima Al-Mansouri</option>
        <option value="Mr. Carlos Mendez">Mr. Carlos Mendez</option>
        <option value="Dr. Sarah Johnson">Dr. Sarah Johnson</option>
      </select>
    </div>
    <button class="start-btn" id="startQuizBtn">▶ Start Test (60 min timer begins)</button>
  </div>

  <!-- QUIZ AREA (hidden initially) -->
  <div id="quizArea" class="quiz-area">
    <div class="header">
      <h1>📋 Global Aptitude Test</h1>
      <div>80 MCQs | 8 sections</div>
      <div class="timer" id="timerDisplay">60:00</div>
    </div>
    <div class="student-info-bar" id="quizStudentInfo"></div>
    <form id="quizForm"></form>
    <button class="submit-btn" id="submitQuizBtn">📤 Submit Test</button>
    <footer>Do not refresh. Timer auto‑submits at 0:00.</footer>
  </div>
</div>

<script>
  // ======================== 80 GLOBAL MCQs ========================
  // Sections: 0=Analytical,1=English,2=Math,3=Business,4=Psychology,5=Computer,6=Design,7=GK
  const SECTIONS = [
    "Analytical Reasoning", "English Language Skills", "Mathematics",
    "Business Aptitude", "Psychology", "Computer Knowledge",
    "Design Sense", "General Knowledge (Global)"
  ];

  // Full 80 questions (each: {section, text, options, correct})
  const QUESTIONS = [
    // Section 0: Analytical Reasoning (0-9)
    { section:0, text:"If 2★3 = 8, 4★5 = 18, then 6★7 = ?", options:["24","30","32","36"], correct:2 },
    { section:0, text:"Complete series: 3, 7, 15, 31, ?", options:["63","57","61","59"], correct:0 },
    { section:0, text:"A man walks 10 km North, turns left 5 km, turns left 10 km. How far from start?", options:["0 km","5 km","10 km","15 km"], correct:1 },
    { section:0, text:"If 'PARIS' is coded as 'QBSJT', what is 'LONDON'?", options:["MPOEPO","MNPEPO","MPEPON","MOPEPN"], correct:0 },
    { section:0, text:"Find odd one out: 11, 13, 17, 19, 23, 29, 31, 37, 41", options:["23","29","37","41"], correct:3 },
    { section:0, text:"Clock shows 2:45. Angle between hands?", options:["172.5°","187.5°","165°","180°"], correct:0 },
    { section:0, text:"If 7#3 = 28, 5#4 = 20, 6#2 = 12, then 8#5 = ?", options:["40","30","35","45"], correct:0 },
    { section:0, text:"Find next: A1, B4, C9, D16, ?", options:["E25","E24","F25","F24"], correct:0 },
    { section:0, text:"If 60% of (x-y) = 40% of (x+y), then y is what % of x?", options:["20%","25%","30%","16.67%"], correct:0 },
    { section:0, text:"Complete pattern: 2, 6, 12, 20, ?", options:["30","28","32","36"], correct:0 },
    // Section 1: English (10-19)
    { section:1, text:"Synonym of 'Ubiquitous'", options:["Rare","Everywhere","Hidden","Sudden"], correct:1 },
    { section:1, text:"Correct spelling:", options:["Accommodate","Acommodate","Accomodate","Acomodate"], correct:0 },
    { section:1, text:"Passive: 'Someone stole my wallet'", options:["My wallet was stolen","My wallet is stolen","My wallet has stolen","My wallet stolen"], correct:0 },
    { section:1, text:"Antonym of 'Ephemeral'", options:["Short-lived","Eternal","Brief","Fleeting"], correct:1 },
    { section:1, text:"Fill: 'She ____ to the party if she had known.'", options:["would come","would have come","came","had come"], correct:1 },
    { section:1, text:"Which means 'to calm or pacify'?", options:["Aggravate","Appease","Provoke","Enrage"], correct:1 },
    { section:1, text:"Idiom 'Bite the bullet' means:", options:["Avoid pain","Face difficulty","Run away","Celebrate"], correct:1 },
    { section:1, text:"Error: 'Each of the boys have completed their homework.'", options:["Each","boys","have","their"], correct:2 },
    { section:1, text:"One word for 'knows everything'", options:["Omniscient","Omnipotent","Omnipresent","Ambivert"], correct:0 },
    { section:1, text:"'The Amazon produces 20% of oxygen.' Main idea?", options:["Amazon is large","Amazon produces oxygen","Oxygen is important","Rainforests threatened"], correct:1 },
    // Section 2: Mathematics (20-29)
    { section:2, text:"15% of 200 = ?", options:["20","25","30","35"], correct:2 },
    { section:2, text:"300 km in 5 hours → speed in m/s?", options:["16.67","60","20","12.5"], correct:0 },
    { section:2, text:"Average of 8 numbers is 15. Remove 20, new average?", options:["14","14.28","15","13.5"], correct:1 },
    { section:2, text:"(2^4 × 3^2) / 12 = ?", options:["12","18","24","36"], correct:0 },
    { section:2, text:"a:b = 3:4, b:c = 2:5, find a:c", options:["3:10","6:20","3:5","6:15"], correct:0 },
    { section:2, text:"Simple interest $1000 at 6% for 2 years?", options:["$120","$60","$180","$100"], correct:0 },
    { section:2, text:"Square perimeter 48 cm → area?", options:["144 cm²","96 cm²","128 cm²","256 cm²"], correct:0 },
    { section:2, text:"Solve 4x - 7 = 2x + 9 → x = ?", options:["8","-8","4","16"], correct:0 },
    { section:2, text:"Profit 20% on SP → profit % on CP?", options:["25%","20%","16.67%","33.33%"], correct:0 },
    { section:2, text:"LCM of 8, 12, 15", options:["60","120","240","180"], correct:1 },
    // Section 3: Business Aptitude (30-39)
    { section:3, text:"CP=$250, SP=$325, profit %?", options:["25%","30%","20%","35%"], correct:1 },
    { section:3, text:"15% discount on $800 → final price?", options:["$680","$720","$700","$750"], correct:0 },
    { section:3, text:"Variable cost example?", options:["Rent","Raw materials","Insurance","Manager salary"], correct:1 },
    { section:3, text:"Simple interest $5000 at 5% for 3 years?", options:["$750","$500","$250","$1000"], correct:0 },
    { section:3, text:"Revenue $80k, Costs $60k, profit margin on revenue?", options:["25%","20%","30%","40%"], correct:0 },
    { section:3, text:"P/E ratio formula?", options:["Price/Earnings","Earnings/Price","Price/Sales","Dividend/Price"], correct:0 },
    { section:3, text:"Current liability?", options:["Inventory","Accounts payable","Machinery","Patent"], correct:1 },
    { section:3, text:"Break-even is where:", options:["Revenue = Cost","Profit = 0","Total cost = Total revenue","All of above"], correct:3 },
    { section:3, text:"Elasticity 0.2 → demand is:", options:["Elastic","Inelastic","Unitary","Perfectly elastic"], correct:1 },
    { section:3, text:"200 pens @ $0.50, sell 150 @ $1, 50 @ $0.25. Net profit?", options:["$50","$62.50","$75","$37.50"], correct:1 },
    // Section 4: Psychology (40-49)
    { section:4, text:"Intrinsic motivation example:", options:["Study for money","Study for enjoyment","Study to avoid punishment","Study for praise"], correct:1 },
    { section:4, text:"Bystander effect means:", options:["More help when alone","Less help in crowd","People ignore emergencies","Both A and C"], correct:3 },
    { section:4, text:"Memory lasting 20-30 seconds?", options:["Sensory","Short-term","Long-term","Procedural"], correct:1 },
    { section:4, text:"Fear of dogs after bite is:", options:["Classical conditioning","Operant conditioning","Observational","Insight"], correct:0 },
    { section:4, text:"High emotional intelligence:", options:["Impulsivity","Recognizing others' emotions","Suppressing feelings","Ignoring feedback"], correct:1 },
    { section:4, text:"Growth mindset belief:", options:["Ability fixed","Effort improves ability","Talent is everything","Failure permanent"], correct:1 },
    { section:4, text:"Projection is:", options:["Blaming others","Denying reality","Forgetting trauma","Acting out"], correct:0 },
    { section:4, text:"Marshmallow test measures:", options:["IQ","Delayed gratification","Memory","Creativity"], correct:1 },
    { section:4, text:"Visual learner prefers:", options:["Diagrams","Listening","Moving","Reading"], correct:0 },
    { section:4, text:"External attribution:", options:["'I failed because test was hard'","'I failed because I'm dumb'","'I succeeded because I'm smart'","'I succeeded because I worked hard'"], correct:0 },
    // Section 5: Computer (50-59)
    { section:5, text:"Which is an OS?", options:["Windows","Excel","Chrome","Python"], correct:0 },
    { section:5, text:"Shortcut for paste?", options:["Ctrl+C","Ctrl+V","Ctrl+X","Ctrl+Z"], correct:1 },
    { section:5, text:"RAM stands for:", options:["Random Access Memory","Readily Available Memory","Read And Modify","Rapid Access Memory"], correct:0 },
    { section:5, text:"Search engine example:", options:["Google","Chrome","Firefox","Edge"], correct:0 },
    { section:5, text:"Cloud storage:", options:["Google Drive","Hard disk","USB","SSD"], correct:0 },
    { section:5, text:"URL stands for:", options:["Uniform Resource Locator","Universal Resource Link","Uniform Retrieval Language","United Resource Locator"], correct:0 },
    { section:5, text:"Output device:", options:["Monitor","Keyboard","Mouse","Scanner"], correct:0 },
    { section:5, text:"Phishing is:", options:["Fake emails to steal info","Hacking","Virus spreading","Password cracking"], correct:0 },
    { section:5, text:"1 TB = ? GB", options:["1000","1024","1048","10000"], correct:1 },
    { section:5, text:"Web structure language?", options:["HTML","Python","Java","C++"], correct:0 },
    // Section 6: Design Sense (60-69)
    { section:6, text:"Complementary colors:", options:["Red & Green","Blue & Orange","Yellow & Purple","All of above"], correct:3 },
    { section:6, text:"Best font for screen readability?", options:["Times New Roman","Arial","Comic Sans","Papyrus"], correct:1 },
    { section:6, text:"Golden ratio approx:", options:["1.618","1.414","1.732","2.718"], correct:0 },
    { section:6, text:"Symmetry creates:", options:["Stability","Chaos","Tension","Movement"], correct:0 },
    { section:6, text:"White space is:", options:["Empty area","Margin","Breathing room","All of above"], correct:3 },
    { section:6, text:"Warning color?", options:["Red","Yellow","Green","Blue"], correct:1 },
    { section:6, text:"Apple logo type:", options:["Iconic","Abstract","Wordmark","Combination"], correct:0 },
    { section:6, text:"Typography hierarchy helps:", options:["Guide attention","Increase font size","Add colors","Reduce words"], correct:0 },
    { section:6, text:"Highest readability:", options:["Black on white","Blue on red","Green on purple","Yellow on white"], correct:0 },
    { section:6, text:"Wireframe is:", options:["Low-fidelity layout","High-fidelity mockup","Color palette","Code structure"], correct:0 },
    // Section 7: General Knowledge Global (70-79)
    { section:7, text:"Who wrote '1984'?", options:["George Orwell","Aldous Huxley","Ray Bradbury","H.G. Wells"], correct:0 },
    { section:7, text:"Longest river in the world?", options:["Amazon","Nile","Yangtze","Mississippi"], correct:1 },
    { section:7, text:"CEO of Microsoft?", options:["Satya Nadella","Bill Gates","Tim Cook","Elon Musk"], correct:0 },
    { section:7, text:"Largest desert?", options:["Sahara","Antarctic","Gobi","Arabian"], correct:1 },
    { section:7, text:"Who painted 'Starry Night'?", options:["Van Gogh","Picasso","Monet","Da Vinci"], correct:0 },
    { section:7, text:"Currency of UK?", options:["Euro","Pound Sterling","Dollar","Yen"], correct:1 },
    { section:7, text:"First country to give women vote?", options:["USA","New Zealand","UK","France"], correct:1 },
    { section:7, text:"First person on moon?", options:["Neil Armstrong","Buzz Aldrin","Yuri Gagarin","Michael Collins"], correct:0 },
    { section:7, text:"Author of 'Pride and Prejudice'?", options:["Jane Austen","Charles Dickens","Emily Brontë","Mark Twain"], correct:0 },
    { section:7, text:"Olympics originated in?", options:["Greece","Rome","Egypt","Persia"], correct:0 }
  ];

  // Ensure we have exactly 80 (if any missing, fill with placeholder – but we have 80)
  console.log("Total questions loaded:", QUESTIONS.length);

  // ========== GLOBAL VARIABLES ==========
  let startTime = null;
  let timerInterval = null;
  let quizActive = false;
  let submitted = false;

  // Your Google Apps Script Web App URL (replace with your actual URL)
  const WEBAPP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL"; // 👈 PASTE YOUR URL HERE

  // DOM elements
  const preQuizDiv = document.getElementById('preQuizSection');
  const quizAreaDiv = document.getElementById('quizArea');
  const startBtn = document.getElementById('startQuizBtn');
  const submitBtn = document.getElementById('submitQuizBtn');
  const quizForm = document.getElementById('quizForm');
  const timerDisplayElem = document.getElementById('timerDisplay');
  const quizStudentInfoSpan = document.getElementById('quizStudentInfo');

  // Auto-fill from URL parameters (if any)
  const urlParams = new URLSearchParams(window.location.search);
  const urlName = urlParams.get('name');
  const urlEmail = urlParams.get('email');
  if (urlName) document.getElementById('studentName').value = urlName;
  if (urlEmail) document.getElementById('studentEmail').value = urlEmail;

  // Function to render all 80 questions dynamically
  function renderQuizForm() {
    quizForm.innerHTML = '';
    for (let s = 0; s < SECTIONS.length; s++) {
      const sectionDiv = document.createElement('div');
      sectionDiv.className = 'section';
      sectionDiv.innerHTML = `<h2>${SECTIONS[s]}</h2>`;
      const sectionQuestions = QUESTIONS.filter(q => q.section === s);
      sectionQuestions.forEach((q, idx) => {
        const globalIdx = QUESTIONS.findIndex(qq => qq === q);
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `
          <p>${idx+1}. ${q.text}</p>
          <div class="options">
            ${q.options.map((opt, optIdx) => `
              <label>
                <input type="radio" name="q${globalIdx}" value="${optIdx}">
                ${String.fromCharCode(65+optIdx)}. ${opt}
              </label>
            `).join('')}
          </div>
        `;
        sectionDiv.appendChild(qDiv);
      });
      quizForm.appendChild(sectionDiv);
    }
  }

  // Timer function
  function startTimer() {
    startTime = new Date();
    let secondsLeft = 60 * 60; // 3600 seconds
    timerInterval = setInterval(() => {
      if (!quizActive || submitted) return;
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        timerDisplayElem.innerText = "00:00";
        alert("Time is up! Auto-submitting.");
        submitQuiz(true);
      } else {
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        timerDisplayElem.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
      }
    }, 1000);
  }

  function getTimeTakenMinutes() {
    if (!startTime) return 0;
    const end = new Date();
    return (end - startTime) / 60000;
  }

  function calculateScores() {
    let sectionScores = [0,0,0,0,0,0,0,0];
    let totalRaw = 0;
    for (let i = 0; i < QUESTIONS.length; i++) {
      const selected = document.querySelector(`input[name="q${i}"]:checked`);
      if (selected) {
        const answer = parseInt(selected.value);
        if (answer === QUESTIONS[i].correct) {
          sectionScores[QUESTIONS[i].section]++;
          totalRaw++;
        }
      }
    }
    return { sectionScores, totalRaw };
  }

  function applyPenalty(timeTaken) {
    if (timeTaken <= 62) return 0;
    const over = timeTaken - 60;
    let penalty = Math.floor(over * 0.5);
    return Math.min(penalty, 10);
  }

  async function submitQuiz(isAuto = false) {
    if (submitted) return;
    submitted = true;
    quizActive = false;
    if (timerInterval) clearInterval(timerInterval);
    const timeTaken = getTimeTakenMinutes();
    const { sectionScores, totalRaw } = calculateScores();
    const penalty = applyPenalty(timeTaken);
    const finalScore = totalRaw - penalty;

    // Gather student info from pre-quiz form
    const studentName = document.getElementById('studentName').value;
    const studentDob = document.getElementById('studentDob').value;
    const studentEmail = document.getElementById('studentEmail').value;
    const studentCounselor = document.getElementById('studentCounselor').value;

    const payload = {
      studentId: studentName.replace(/\s/g,'') + Date.now(),
      studentName: studentName,
      email: studentEmail,
      dob: studentDob,
      counselor: studentCounselor,
      timeTaken: timeTaken.toFixed(1),
      scores: {
        analytical: sectionScores[0],
        english: sectionScores[1],
        math: sectionScores[2],
        business: sectionScores[3],
        psychology: sectionScores[4],
        computer: sectionScores[5],
        design: sectionScores[6],
        gk: sectionScores[7]
      },
      totalRaw: totalRaw,
      penalty: penalty,
      finalScore: finalScore,
      ip: ""
    };

    // Send to Google Sheets (if WEBAPP_URL is set)
    if (WEBAPP_URL && WEBAPP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL") {
      try {
        await fetch(WEBAPP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        alert(`Test Submitted!\nRaw: ${totalRaw}/80\nPenalty: ${penalty}\nFinal: ${finalScore}\n\nScores:\nAnalytical: ${sectionScores[0]}\nEnglish: ${sectionScores[1]}\nMath: ${sectionScores[2]}\nBusiness: ${sectionScores[3]}\nPsychology: ${sectionScores[4]}\nComputer: ${sectionScores[5]}\nDesign: ${sectionScores[6]}\nGK: ${sectionScores[7]}`);
      } catch(e) {
        console.error("Submit error", e);
        alert("Test completed but could not save to server. Please screenshot your score.");
      }
    } else {
      alert(`Demo mode - Test completed!\nRaw: ${totalRaw}/80\nFinal: ${finalScore}\n\n(Results not saved because WEBAPP_URL is not set.)`);
    }
    submitBtn.disabled = true;
    submitBtn.innerText = "✓ Submitted";
  }

  // Start quiz: hide pre-quiz, show quiz area, render questions, start timer
  function startQuiz() {
    const name = document.getElementById('studentName').value.trim();
    const dob = document.getElementById('studentDob').value;
    const email = document.getElementById('studentEmail').value.trim();
    const counselor = document.getElementById('studentCounselor').value;

    if (!name || !dob || !email || !counselor) {
      alert("Please fill all fields: Name, Date of Birth, Email, and Counselor.");
      return;
    }
    if (!email.includes('@')) {
      alert("Please enter a valid email address.");
      return;
    }

    // Hide pre-quiz, show quiz area
    preQuizDiv.style.display = 'none';
    quizAreaDiv.style.display = 'block';

    // Render questions
    renderQuizForm();

    // Display student info in quiz header
    quizStudentInfoSpan.innerHTML = `<span>🧑‍🎓 ${name}</span> <span>📧 ${email}</span> <span>👩‍🏫 ${counselor}</span>`;

    // Activate quiz and start timer
    quizActive = true;
    startTimer();
  }

  // Attach event listener
  startBtn.addEventListener('click', startQuiz);
  submitBtn.addEventListener('click', () => submitQuiz(false));
</script>
</body>
</html>
