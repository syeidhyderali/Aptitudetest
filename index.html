<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>STUDENT APTITUDE | 80 MCQs | 60 min</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0f2a, #1e1a4a, #4a1e5e, #c75c8c, #1e1a4a, #0a0f2a);
      background-size: 400% 400%;
      animation: dissolveShift 18s ease infinite;
      min-height: 100vh;
      padding: 20px;
    }
    @keyframes dissolveShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 50%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 50%; }
      100% { background-position: 0% 50%; }
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(3px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: visible;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(90deg, #0f1a2f, #1f2a4a);
      color: white;
      padding: 1rem 2rem;
      text-align: center;
      border-radius: 40px 40px 0 0;
    }
    .header h1 {
      font-family: 'Space Grotesk', monospace;
      font-weight: 700;
      letter-spacing: -0.5px;
      font-size: 1.8rem;
    }
    .timer {
      font-family: 'Space Grotesk', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      background: #ff3366;
      display: inline-block;
      padding: 0.3rem 1.8rem;
      border-radius: 60px;
      margin-top: 10px;
    }
    .student-info-bar {
      position: sticky;
      top: 85px;
      z-index: 99;
      background: #f8f9ff;
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      font-family: 'Space Grotesk', monospace;
    }
    .progress-bar-container {
      position: sticky;
      top: 140px;
      z-index: 98;
      background: #ffffffcc;
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      overflow-x: auto;
      white-space: nowrap;
      border-bottom: 1px solid #ddd;
    }
    .nav-btn {
      margin: 3px;
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px solid #1f2a4a;
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      font-family: 'Space Grotesk', monospace;
    }
    .nav-btn:hover { background: #1f2a4a; color: white; transform: scale(1.02); }
    .pre-quiz { padding: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { font-weight: 600; display: block; margin-bottom: 0.5rem; color: #0f1a2f; }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 28px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #ff3366;
      box-shadow: 0 0 0 3px rgba(255,51,102,0.2);
    }
    .start-btn {
      background: linear-gradient(90deg, #ff3366, #ff6633);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      font-family: 'Space Grotesk', monospace;
    }
    .start-btn:hover { transform: scale(1.01); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .quiz-area { display: none; }
    .section {
      background: rgba(255,255,240,0.7);
      margin: 24px;
      padding: 20px;
      border-radius: 28px;
      border-left: 6px solid #ff3366;
      backdrop-filter: blur(2px);
    }
    .section h2 { font-family: 'Space Grotesk', monospace; color: #0f1a2f; margin-bottom: 16px; }
    .question {
      background: white;
      margin: 20px 0;
      padding: 18px;
      border-radius: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .question p { font-weight: 600; margin-bottom: 12px; }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-left: 20px;
    }
    .options label { font-weight: normal; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
    .submit-btn {
      background: #1f2a4a;
      color: white;
      border: none;
      width: 80%;
      margin: 20px auto 40px;
      display: block;
      padding: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      font-family: 'Space Grotesk', monospace;
    }
    .submit-btn:hover { background: #ff3366; transform: scale(1.02); }
    .submit-btn:disabled { background: #888; cursor: not-allowed; }
    footer { text-align: center; padding: 16px; font-size: 0.8rem; color: #555; }
    .thankyou {
      text-align: center;
      padding: 60px 30px;
      background: #e0f2fe;
      border-radius: 40px;
      margin: 40px;
    }
    .thankyou h2 { color: #0f1a2f; font-family: 'Space Grotesk', monospace; }
    #floatingTimer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      color: #ffcc66;
      font-family: 'Space Grotesk', monospace;
      font-size: 1.6rem;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 50px;
      z-index: 9999;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    #floatingTimer:hover { transform: scale(1.05); background: black; }
    @media (max-width: 700px) {
      .options { flex-direction: column; gap: 10px; }
      .timer { font-size: 1.8rem; }
      .header h1 { font-size: 1.2rem; }
      .student-info-bar { top: 70px; }
      .progress-bar-container { top: 120px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="preQuizSection" class="pre-quiz">
    <h1 style="text-align:center; font-family:'Space Grotesk';">⚡ STUDENT APTITUDE TEST ⚡</h1>
    <p style="text-align:center; margin-bottom:2rem;">80 questions | 60 minutes | Global benchmark</p>
    <div class="form-group"><label>Full Name *</label><input type="text" id="studentName" placeholder="e.g., Sofia Ramirez" required></div>
    <div class="form-group"><label>Date of Birth *</label><input type="date" id="studentDob" required></div>
    <div class="form-group"><label>Email Address *</label><input type="email" id="studentEmail" placeholder="student@example.com" required></div>
    <div class="form-group">
      <label>Student Counselor *</label>
      <select id="studentCounselor" required>
        <option value="">-- Select Counselor --</option>
        <option value="Ms. Sandhra Prateesh">Ms. Sandhra Prateesh</option>
        <option value="Mr. Ali Haider Bhutta">Mr. Ali Haider Bhutta</option>
        <option value="Ms. Laiba Nadeem">Ms. Laiba Nadeem</option>
        <option value="Mr. Subramanian Iyer">Mr. Subramanian Iyer</option>
        <option value="Ms. Zyphren Rea L. Pitpit">Ms. Zyphren Rea L. Pitpit</option>
        <option value="Ms. Aranaya Sushenababu">Ms. Aranaya Sushenababu</option>
        <option value="Ajman Admissions Team">Ajman Admissions Team</option>
        <option value="RAK Admissions Team">RAK Admissions Team</option>
        <option value="AUH Admissions Team">AUH Admissions Team</option>
        <option value="Walsh Admissions Team">Walsh Admissions Team</option>
        <option value="Riyadh Admissions Team">Riyadh Admissions Team</option>
        <option value="Lahore Admissions Team">Lahore Admissions Team</option>
      </select>
    </div>
    <button class="start-btn" id="startQuizBtn">▶ ENTER THE TEST (TOTAL TIME: 60 MIN)</button>
  </div>

  <div id="quizArea" class="quiz-area">
    <div class="header"><h1>⚡ NEO APTITUDE ⚡</h1><div class="timer" id="timerDisplay">60:00</div></div>
    <div class="student-info-bar" id="quizStudentInfo"></div>
    <div class="progress-bar-container" id="progressBarContainer" style="display: none;">
      <span style="font-weight:bold;">⤴ JUMP TO QUESTION:</span>
      <div id="questionNavButtons" style="display:inline-block;"></div>
    </div>
    <form id="quizForm"></form>
    <button class="submit-btn" id="submitQuizBtn">🚀 SUBMIT TEST</button>
    <footer>Do not refresh. Auto-submit at 0:00. Honour code applies.</footer>
  </div>
  <div id="thankyouMessage" style="display: none;"></div>
</div>
<div id="floatingTimer">60:00</div>

<script>
  // ----------------------------- GENERIC 80 QUESTIONS (NO SECTION PREFIX, GLOBAL NUMBERING) ---------------------------------
  const SECTIONS = ["Analytical Reasoning", "English Language", "Mathematics", "Business Aptitude", "Psychology", "Computer Knowledge", "Design Sense", "General Knowledge (Global)"];
  
  // Build 80 questions – each with clean text (no "Q1:" prefixes)
  function buildQuestions() {
    const qs = [];
    // 1-10 Analytical
    qs.push({ section:0, text: "Find the next number: 2, 5, 10, 17, ?", options: ["24","26","28","30"], correct:0 });
    qs.push({ section:0, text: "If 2★3 = 8, 4★5 = 18, then 6★7 = ?", options: ["24","30","32","36"], correct:2 });
    qs.push({ section:0, text: "Complete series: 3, 7, 15, 31, ?", options: ["63","57","61","59"], correct:0 });
    qs.push({ section:0, text: "A clock shows 3:30. Angle between hands?", options: ["75°","90°","105°","120°"], correct:0 });
    qs.push({ section:0, text: "In a code, MASTER is written as OCUVGT. What is FATHER?", options: ["HCUVGT","HCVJGT","HDUJGT","HCWJGT"], correct:1 });
    qs.push({ section:0, text: "If 60% of (x−y) = 40% of (x+y), then y is what % of x?", options: ["20%","25%","30%","16.67%"], correct:0 });
    qs.push({ section:0, text: "Find odd one out: 11, 13, 17, 19, 23, 29, 31, 37, 41", options: ["23","29","37","41"], correct:3 });
    qs.push({ section:0, text: "A man walks 5 km north, turns left 3 km, turns left 5 km. How far from start?", options: ["0 km","3 km","5 km","8 km"], correct:1 });
    qs.push({ section:0, text: "If 7#3 = 28, 5#4 = 20, 6#2 = 12, then 8#5 = ?", options: ["40","30","35","45"], correct:0 });
    qs.push({ section:0, text: "Which word is different? Apple, Mango, Orange, Banana", options: ["Apple","Mango","Orange","Banana"], correct:2 });
    // 11-20 English
    qs.push({ section:1, text: "Synonym of 'Ephemeral'", options: ["Eternal","Short-lived","Strong","Weak"], correct:1 });
    qs.push({ section:1, text: "Correct spelling:", options: ["Accommodate","Acommodate","Accomodate","Acomodate"], correct:0 });
    qs.push({ section:1, text: "Choose the correct passive: 'Someone stole my wallet'", options: ["My wallet was stolen","My wallet is stolen","My wallet has stolen","My wallet stolen"], correct:0 });
    qs.push({ section:1, text: "Antonym of 'Benevolent'", options: ["Kind","Generous","Cruel","Charitable"], correct:2 });
    qs.push({ section:1, text: "Fill: 'Neither the teacher nor the students ____ satisfied.'", options: ["is","am","are","was"], correct:2 });
    qs.push({ section:1, text: "Idiom 'Bite the bullet' means:", options: ["Avoid pain","Face difficulty","Run away","Celebrate"], correct:1 });
    qs.push({ section:1, text: "Identify error: 'Each of the boys have completed their homework.'", options: ["Each","boys","have","their"], correct:2 });
    qs.push({ section:1, text: "One word substitution: 'A speech made without preparation'", options: ["Extempore","Eloquent","Oratory","Soliloquy"], correct:0 });
    qs.push({ section:1, text: "Which word means 'to reduce the severity of'?", options: ["Aggravate","Alleviate","Augment","Amplify"], correct:1 });
    qs.push({ section:1, text: "Choose the correct sentence:", options: ["She has went to the market","She went to the market","She have gone","She is went"], correct:1 });
    // 21-30 Mathematics
    qs.push({ section:2, text: "15% of 40 = x% of 30. Find x.", options: ["15","20","25","30"], correct:1 });
    qs.push({ section:2, text: "A car travels 240 km in 4 hours. Speed in m/s?", options: ["16.67","60","20","50"], correct:0 });
    qs.push({ section:2, text: "Average of 5 numbers is 12. Remove one, average becomes 10. Removed number?", options: ["15","18","20","22"], correct:2 });
    qs.push({ section:2, text: "Simplify: (2³ × 3²) / 6 = ?", options: ["8","12","18","24"], correct:1 });
    qs.push({ section:2, text: "If a:b = 2:3 and b:c = 4:5, find a:c.", options: ["6:15","8:15","7:15","10:15"], correct:1 });
    qs.push({ section:2, text: "Simple interest on ₹500 for 3 years at 5% p.a. is?", options: ["₹75","₹80","₹85","₹90"], correct:0 });
    qs.push({ section:2, text: "Perimeter of square = 64 cm. Area?", options: ["256 cm²","128 cm²","64 cm²","32 cm²"], correct:0 });
    qs.push({ section:2, text: "Solve: 3x + 5 = 2x – 7 → x = ?", options: ["-12","-2","2","12"], correct:0 });
    qs.push({ section:2, text: "Profit 20% on SP, then profit % on CP is?", options: ["16.67%","20%","25%","33.33%"], correct:2 });
    qs.push({ section:2, text: "LCM of 12, 18, 24 is?", options: ["48","60","72","96"], correct:2 });
    // 31-40 Business Aptitude
    qs.push({ section:3, text: "Cost price ₹600, selling price ₹750, profit %?", options: ["20%","25%","30%","35%"], correct:1 });
    qs.push({ section:3, text: "Discount of 10% on ₹1200 gives final price?", options: ["₹1000","₹1020","₹1080","₹1100"], correct:2 });
    qs.push({ section:3, text: "Which is not a fixed cost?", options: ["Raw material","Rent","Insurance","Manager salary"], correct:0 });
    qs.push({ section:3, text: "Simple interest on ₹2000 at 8% for 2 years?", options: ["₹240","₹280","₹320","₹360"], correct:2 });
    qs.push({ section:3, text: "Revenue ₹50000, costs ₹35000, profit margin % on revenue?", options: ["20%","30%","40%","50%"], correct:1 });
    qs.push({ section:3, text: "P/E ratio formula?", options: ["Price/Earnings","Earnings/Price","Price/Sales","Dividend/Price"], correct:0 });
    qs.push({ section:3, text: "Which is a current asset?", options: ["Machinery","Inventory","Building","Patent"], correct:1 });
    qs.push({ section:3, text: "Break-even point is where:", options: ["Profit = Loss","Revenue = Cost","MR = MC","All of above"], correct:3 });
    qs.push({ section:3, text: "If price elasticity is 0.5, demand is:", options: ["Elastic","Inelastic","Unitary","Perfectly elastic"], correct:1 });
    qs.push({ section:3, text: "Buy 100 pens at ₹10 each, sell 80 at ₹15 and 20 at ₹5. Net profit?", options: ["₹200","₹300","₹400","₹500"], correct:1 });
    // 41-50 Psychology
    qs.push({ section:4, text: "Which is an example of intrinsic motivation?", options: ["Studying for a prize","Studying because you enjoy it","Studying to avoid punishment","Studying to impress parents"], correct:1 });
    qs.push({ section:4, text: "Bystander effect means:", options: ["People help more when alone","People help more in crowds","People ignore emergencies","Both A and C"], correct:3 });
    qs.push({ section:4, text: "Which memory type holds information for seconds?", options: ["Long-term","Working","Sensory","Procedural"], correct:2 });
    qs.push({ section:4, text: "Fear of maths due to past bad experience is:", options: ["Classical conditioning","Operant conditioning","Observational learning","Insight learning"], correct:0 });
    qs.push({ section:4, text: "Which is a sign of high emotional intelligence?", options: ["Ignoring feelings","Reacting impulsively","Recognizing others' emotions","Suppressing anger"], correct:2 });
    qs.push({ section:4, text: "Growth mindset is believing that:", options: ["Abilities are fixed","Effort can improve ability","Talent is genetic","Failure is permanent"], correct:1 });
    qs.push({ section:4, text: "Defense mechanism that involves blaming others?", options: ["Denial","Projection","Repression","Sublimation"], correct:1 });
    qs.push({ section:4, text: "Marshmallow test measures:", options: ["IQ","Delayed gratification","Memory","Creativity"], correct:1 });
    qs.push({ section:4, text: "Which learning style prefers diagrams and charts?", options: ["Auditory","Kinesthetic","Visual","Reading/Writing"], correct:2 });
    qs.push({ section:4, text: "External attribution example:", options: ["'I failed because test was unfair'","'I failed because I'm not smart'","'I succeeded because I'm talented'","'I succeeded because I worked hard'"], correct:0 });
    // 51-60 Computer Knowledge
    qs.push({ section:5, text: "Which is not an operating system?", options: ["Windows","Linux","Android","Excel"], correct:3 });
    qs.push({ section:5, text: "Shortcut for 'copy' is:", options: ["Ctrl+C","Ctrl+X","Ctrl+V","Ctrl+Z"], correct:0 });
    qs.push({ section:5, text: "RAM stands for:", options: ["Readily Accessible Memory","Random Access Memory","Read And Modify","Rapid Action Memory"], correct:1 });
    qs.push({ section:5, text: "Which is a search engine?", options: ["Windows","Google Chrome","Google","Microsoft Edge"], correct:2 });
    qs.push({ section:5, text: "Cloud storage example:", options: ["Google Drive","Hard disk","USB drive","SSD"], correct:0 });
    qs.push({ section:5, text: "URL stands for:", options: ["Uniform Resource Locator","Universal Resource Link","Uniform Retrieval Language","United Resource Locator"], correct:0 });
    qs.push({ section:5, text: "Which is an output device?", options: ["Keyboard","Mouse","Scanner","Monitor"], correct:3 });
    qs.push({ section:5, text: "Phishing is:", options: ["Hacking computers","Fake emails to steal info","Virus spreading","Password cracking"], correct:1 });
    qs.push({ section:5, text: "1 GB = ? MB", options: ["1000","1024","1048","10000"], correct:1 });
    qs.push({ section:5, text: "Which language is used for web design?", options: ["Python","Java","HTML","C++"], correct:2 });
    // 61-70 Design Sense
    qs.push({ section:6, text: "Complementary colors are opposite on color wheel. Example:", options: ["Red & Yellow","Blue & Orange","Green & Purple","Black & White"], correct:1 });
    qs.push({ section:6, text: "Which font is easier to read on screen?", options: ["Times New Roman","Comic Sans","Arial","Papyrus"], correct:2 });
    qs.push({ section:6, text: "The golden ratio approx is:", options: ["1.618","1.414","1.732","2.718"], correct:0 });
    qs.push({ section:6, text: "Which layout principle gives a sense of stability?", options: ["Asymmetry","Radial","Dynamic","Symmetry"], correct:3 });
    qs.push({ section:6, text: "White space in design is:", options: ["Empty area","White color only","Margin around text","Both A and C"], correct:3 });
    qs.push({ section:6, text: "Which color suggests caution?", options: ["Red","Green","Yellow","Blue"], correct:2 });
    qs.push({ section:6, text: "Logo of Apple is an example of:", options: ["Wordmark","Abstract","Iconic","Combination"], correct:2 });
    qs.push({ section:6, text: "Typography hierarchy helps:", options: ["Increase font size","Guide reader's attention","Add colors","Reduce words"], correct:1 });
    qs.push({ section:6, text: "Which combination has highest readability?", options: ["Blue text on red","Black text on white","Green text on purple","Yellow text on white"], correct:1 });
    qs.push({ section:6, text: "A wireframe in UX design is:", options: ["High-fidelity mockup","Low-fidelity layout","Color palette","Code structure"], correct:1 });
    // 71-80 General Knowledge (Global)
    qs.push({ section:7, text: "Who wrote '1984'?", options: ["George Orwell","Aldous Huxley","Ray Bradbury","H.G. Wells"], correct:0 });
    qs.push({ section:7, text: "Longest river in the world?", options: ["Amazon","Nile","Yangtze","Mississippi"], correct:1 });
    qs.push({ section:7, text: "CEO of Microsoft?", options: ["Satya Nadella","Bill Gates","Tim Cook","Elon Musk"], correct:0 });
    qs.push({ section:7, text: "Largest desert?", options: ["Sahara","Antarctic","Gobi","Arabian"], correct:1 });
    qs.push({ section:7, text: "Who painted the Mona Lisa?", options: ["Van Gogh","Picasso","Da Vinci","Rembrandt"], correct:2 });
    qs.push({ section:7, text: "Currency of UK?", options: ["Euro","Pound Sterling","Dollar","Yen"], correct:1 });
    qs.push({ section:7, text: "First country to give women the vote?", options: ["USA","New Zealand","UK","France"], correct:1 });
    qs.push({ section:7, text: "First person on the moon?", options: ["Neil Armstrong","Buzz Aldrin","Yuri Gagarin","Michael Collins"], correct:0 });
    qs.push({ section:7, text: "Author of 'Pride and Prejudice'?", options: ["Jane Austen","Charles Dickens","Emily Brontë","Mark Twain"], correct:0 });
    qs.push({ section:7, text: "Olympics originated in?", options: ["Greece","Rome","Egypt","Persia"], correct:0 });
    return qs;
  }
  const QUESTIONS = buildQuestions();
  
  // ----------------------------- GLOBALS ---------------------------------
  let startTime = null, timerInterval = null, quizActive = false, submitted = false;
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw9uTExike6aFcXnh9F2KaB6cIRRlESPk8WaHU85AvQ6YlAnWPs8_-BsOvSCnApKPI1Pw/exec";

  const preQuizDiv = document.getElementById('preQuizSection');
  const quizAreaDiv = document.getElementById('quizArea');
  const thankyouDiv = document.getElementById('thankyouMessage');
  const startBtn = document.getElementById('startQuizBtn');
  const submitBtn = document.getElementById('submitQuizBtn');
  const quizForm = document.getElementById('quizForm');
  const timerDisplayElem = document.getElementById('timerDisplay');
  const quizStudentInfoSpan = document.getElementById('quizStudentInfo');
  const floatingTimerDiv = document.getElementById('floatingTimer');

  // Prefill name/email from URL
  function prefillFromURL() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    const email = params.get('email');
    const nameField = document.getElementById('studentName');
    const emailField = document.getElementById('studentEmail');
    if (nameField && name) nameField.value = decodeURIComponent(name);
    if (emailField && email) emailField.value = decodeURIComponent(email);
    if ((!nameField || !emailField) && (name || email)) setTimeout(prefillFromURL, 100);
  }
  window.addEventListener('DOMContentLoaded', prefillFromURL);
  startBtn.addEventListener('click', () => setTimeout(prefillFromURL, 10));

  // Render quiz with global numbering (1 to 80)
  function renderQuizForm() {
    quizForm.innerHTML = '';
    for (let s = 0; s < SECTIONS.length; s++) {
      const sectionDiv = document.createElement('div');
      sectionDiv.className = 'section';
      sectionDiv.innerHTML = `<h2>${SECTIONS[s]}</h2>`;
      const sectionQuestions = QUESTIONS.filter(q => q.section === s);
      sectionQuestions.forEach((q, idx) => {
        const globalIdx = QUESTIONS.findIndex(qq => qq === q);
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `
          <p>${globalIdx+1}. ${q.text}</p>
          <div class="options">
            ${q.options.map((opt, optIdx) => `
              <label>
                <input type="radio" name="q${globalIdx}" value="${optIdx}">
                ${String.fromCharCode(65+optIdx)}. ${opt}
              </label>
            `).join('')}
          </div>
        `;
        sectionDiv.appendChild(qDiv);
      });
      quizForm.appendChild(sectionDiv);
    }
  }

  function generateNavButtons() {
    const navDiv = document.getElementById('questionNavButtons');
    if (!navDiv) return;
    navDiv.innerHTML = '';
    const questionDivs = document.querySelectorAll('.question');
    for (let i = 0; i < questionDivs.length; i++) {
      const btn = document.createElement('button');
      btn.textContent = i+1;
      btn.className = 'nav-btn';
      btn.addEventListener('click', () => {
        questionDivs[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      navDiv.appendChild(btn);
    }
    document.getElementById('progressBarContainer').style.display = 'block';
  }

  function startTimer() {
    startTime = new Date();
    let secondsLeft = 3600;
    timerInterval = setInterval(() => {
      if (!quizActive || submitted) return;
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        timerDisplayElem.innerText = "00:00";
        if (floatingTimerDiv) floatingTimerDiv.innerText = "00:00";
        alert("Time's up! Auto-submitting.");
        submitQuiz(true);
      } else {
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        const timeStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        timerDisplayElem.innerText = timeStr;
        if (floatingTimerDiv) floatingTimerDiv.innerText = timeStr;
      }
    }, 1000);
  }

  function getTimeTakenMinutes() {
    if (!startTime) return 0;
    return (new Date() - startTime) / 60000;
  }

  function calculateScores() {
    let sectionScores = [0,0,0,0,0,0,0,0];
    let totalRaw = 0;
    for (let i = 0; i < QUESTIONS.length; i++) {
      const selected = document.querySelector(`input[name="q${i}"]:checked`);
      if (selected && parseInt(selected.value) === QUESTIONS[i].correct) {
        sectionScores[QUESTIONS[i].section]++;
        totalRaw++;
      }
    }
    return { sectionScores, totalRaw };
  }

  function applyPenalty(timeTaken) {
    if (timeTaken <= 62) return 0;
    return Math.min(Math.floor((timeTaken - 60) * 0.5), 10);
  }

  async function submitQuiz(isAuto = false) {
    if (submitted) return;
    submitted = true;
    quizActive = false;
    if (timerInterval) clearInterval(timerInterval);
    const timeTaken = getTimeTakenMinutes();
    const { sectionScores, totalRaw } = calculateScores();
    const penalty = applyPenalty(timeTaken);
    const finalScore = totalRaw - penalty;

    const studentName = document.getElementById('studentName').value;
    const studentDob = document.getElementById('studentDob').value;
    const studentEmail = document.getElementById('studentEmail').value;
    const studentCounselor = document.getElementById('studentCounselor').value;

    const payload = {
      studentId: studentName.replace(/\s/g,'') + Date.now(),
      studentName, email: studentEmail, dob: studentDob, counselor: studentCounselor,
      timeTaken: timeTaken.toFixed(1),
      scores: {
        analytical: sectionScores[0], english: sectionScores[1], math: sectionScores[2],
        business: sectionScores[3], psychology: sectionScores[4], computer: sectionScores[5],
        design: sectionScores[6], gk: sectionScores[7]
      },
      totalRaw, penalty, finalScore, ip: ""
    };

    try {
      await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch(e) { console.error("Save error", e); }

    document.querySelectorAll('#quizForm input[type="radio"]').forEach(r => r.disabled = true);
    submitBtn.disabled = true;
    submitBtn.style.display = 'none';
    quizForm.style.display = 'none';
    thankyouDiv.style.display = 'block';
    thankyouDiv.innerHTML = `
      <div class="thankyou">
        <h2>✅ Mission Complete, ${studentName}!</h2>
        <p>Your responses have been submitted.</p>
        <p>Please refer to  <strong>${studentCounselor}</strong> for your performance insights.</p>
        <p>Thank you for your focus. The future belongs to the curious.</p>
        <br>
        <p style="font-size:0.8rem;">You may now close this window.</p>
      </div>
    `;
    sessionStorage.removeItem('quizActive');
  }

  function startQuiz() {
    const name = document.getElementById('studentName').value.trim();
    const dob = document.getElementById('studentDob').value;
    const email = document.getElementById('studentEmail').value.trim();
    const counselor = document.getElementById('studentCounselor').value;
    if (!name || !dob || !email || !counselor) return alert("Fill all fields.");
    if (!email.includes('@')) return alert("Valid email required.");
    preQuizDiv.style.display = 'none';
    quizAreaDiv.style.display = 'block';
    renderQuizForm();
    generateNavButtons();
    quizStudentInfoSpan.innerHTML = `<span><strong>Student Name:</strong> ${name}</span> | <span><strong>Email:</strong> ${email}</span> | <span><strong>Counsellor:</strong> ${counselor}</span>`;
    quizActive = true;
    sessionStorage.setItem('quizActive', 'true');
    startTimer();
  }

  // Prevent refresh/close
  window.addEventListener('beforeunload', (e) => {
    if (quizActive && !submitted) {
      e.preventDefault();
      e.returnValue = "Test in progress. Your answers will be lost if you leave.";
      return "Test in progress. Your answers will be lost if you leave.";
    }
  });
  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('quizActive') === 'true') {
      sessionStorage.removeItem('quizActive');
      alert("Previous test session was interrupted. Please restart from your email link.");
      window.location.href = window.location.pathname;
    }
  });
  history.pushState(null, null, location.href);
  window.addEventListener('popstate', () => {
    if (quizActive && !submitted) {
      alert("Navigation blocked during test.");
      history.pushState(null, null, location.href);
    }
  });

  startBtn.addEventListener('click', startQuiz);
  submitBtn.addEventListener('click', () => submitQuiz(false));
  floatingTimerDiv.addEventListener('click', () => {
    floatingTimerDiv.style.opacity = floatingTimerDiv.style.opacity === '0.3' ? '1' : '0.3';
  });
</script>
</body>
</html>
