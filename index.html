<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEO APTITUDE | 80 MCQs | 60 min</title>
  <!-- Google Fonts for edgy, modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0f2a, #1e1a4a, #4a1e5e, #c75c8c, #1e1a4a, #0a0f2a);
      background-size: 400% 400%;
      animation: dissolveShift 18s ease infinite;
      min-height: 100vh;
      padding: 20px;
    }

    @keyframes dissolveShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 50%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Main container – glassmorphism style */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(3px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: visible;
      transition: all 0.3s ease;
    }

    /* Sticky header (timer + title) – not full page, fits inside container */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0f1a2f;
      background: linear-gradient(90deg, #0f1a2f, #1f2a4a);
      color: white;
      padding: 1rem 2rem;
      text-align: center;
      border-radius: 40px 40px 0 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .header h1 {
      font-family: 'Space Grotesk', monospace;
      font-weight: 700;
      letter-spacing: -0.5px;
      font-size: 1.8rem;
    }
    .timer {
      font-family: 'Space Grotesk', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      background: #ff3366;
      display: inline-block;
      padding: 0.3rem 1.8rem;
      border-radius: 60px;
      margin-top: 10px;
      box-shadow: 0 0 15px rgba(255,51,102,0.4);
    }

    /* Student info bar – sticky */
    .student-info-bar {
      position: sticky;
      top: 85px;
      z-index: 99;
      background: #f8f9ff;
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      font-family: 'Space Grotesk', monospace;
    }

    /* Progress bar container – sticky */
    .progress-bar-container {
      position: sticky;
      top: 140px;
      z-index: 98;
      background: #ffffffcc;
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      overflow-x: auto;
      white-space: nowrap;
      border-bottom: 1px solid #ddd;
      font-family: 'Space Grotesk', monospace;
    }
    .nav-btn {
      margin: 3px;
      padding: 6px 12px;
      border-radius: 40px;
      border: 1px solid #1f2a4a;
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      font-family: 'Space Grotesk', monospace;
    }
    .nav-btn:hover {
      background: #1f2a4a;
      color: white;
      transform: scale(1.02);
    }

    /* Pre-quiz form */
    .pre-quiz {
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 0.5rem;
      color: #0f1a2f;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 28px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      transition: 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #ff3366;
      box-shadow: 0 0 0 3px rgba(255,51,102,0.2);
    }
    .start-btn {
      background: linear-gradient(90deg, #ff3366, #ff6633);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
      font-family: 'Space Grotesk', monospace;
    }
    .start-btn:hover {
      transform: scale(1.01);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    /* Quiz area */
    .quiz-area {
      display: none;
    }
    .section {
      background: rgba(255,255,240,0.7);
      margin: 24px;
      padding: 20px;
      border-radius: 28px;
      border-left: 6px solid #ff3366;
      backdrop-filter: blur(2px);
    }
    .section h2 {
      font-family: 'Space Grotesk', monospace;
      color: #0f1a2f;
      margin-bottom: 16px;
    }
    .question {
      background: white;
      margin: 20px 0;
      padding: 18px;
      border-radius: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .question p {
      font-weight: 600;
      margin-bottom: 12px;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-left: 20px;
    }
    .options label {
      font-weight: normal;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .submit-btn {
      background: #1f2a4a;
      color: white;
      border: none;
      width: 80%;
      margin: 20px auto 40px;
      display: block;
      padding: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Space Grotesk', monospace;
    }
    .submit-btn:hover {
      background: #ff3366;
      transform: scale(1.02);
    }
    .submit-btn:disabled {
      background: #888;
      cursor: not-allowed;
    }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.8rem;
      color: #555;
    }
    .thankyou {
      text-align: center;
      padding: 60px 30px;
      background: #e0f2fe;
      border-radius: 40px;
      margin: 40px;
    }
    .thankyou h2 {
      color: #0f1a2f;
      font-family: 'Space Grotesk', monospace;
    }

    /* Floating timer */
    #floatingTimer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      color: #ffcc66;
      font-family: 'Space Grotesk', monospace;
      font-size: 1.6rem;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 50px;
      z-index: 9999;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transition: 0.2s;
    }
    #floatingTimer:hover {
      transform: scale(1.05);
      background: black;
    }

    @media (max-width: 700px) {
      .options { flex-direction: column; gap: 10px; }
      .timer { font-size: 1.8rem; }
      .header h1 { font-size: 1.2rem; }
      .student-info-bar { top: 70px; }
      .progress-bar-container { top: 120px; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Pre-quiz section -->
  <div id="preQuizSection" class="pre-quiz">
    <h1 style="text-align:center; font-family:'Space Grotesk';">⚡ NEO APTITUDE TEST ⚡</h1>
    <p style="text-align:center; margin-bottom:2rem;">80 questions | 60 minutes | Global benchmark</p>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="studentName" placeholder="e.g., Sofia Ramirez" required>
    </div>
    <div class="form-group">
      <label>Date of Birth *</label>
      <input type="date" id="studentDob" required>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" id="studentEmail" placeholder="student@example.com" required>
    </div>
    <div class="form-group">
      <label>Student Counselor *</label>
      <select id="studentCounselor" required>
        <option value="">-- Select Counselor --</option>
        <option value="Ms. Sandhra Prateesh">Ms. Sandhra Prateesh</option>
        <option value="Mr. Ali Haider Bhutta">Mr. Ali Haider Bhutta</option>
        <option value="Ms. Laiba Nadeem">Ms. Laiba Nadeem</option>
        <option value="Mr. Subramanian Iyer">Mr. Subramanian Iyer</option>
        <option value="Ms. Zyphren Rea L. Pitpit">Ms. Zyphren Rea L. Pitpit</option>
        <option value="Ms. Aranaya Sushenababu">Ms. Aranaya Sushenababu</option>
        <option value="Ajman Admissions Team">Ajman Admissions Team</option>
        <option value="RAK Admissions Team">RAK Admissions Team</option>
        <option value="AUH Admissions Team">AUH Admissions Team</option>
        <option value="Walsh Admissions Team">Walsh Admissions Team</option>
        <option value="Riyadh Admissions Team">Riyadh Admissions Team</option>
        <option value="Lahore Admissions Team">Lahore Admissions Team</option>
      </select>
    </div>
    <button class="start-btn" id="startQuizBtn">▶ ENTER THE ARENA (60 min timer starts)</button>
  </div>

  <!-- Quiz area (hidden initially) -->
  <div id="quizArea" class="quiz-area">
    <div class="header">
      <h1>⚡ NEO APTITUDE ⚡</h1>
      <div class="timer" id="timerDisplay">60:00</div>
    </div>
    <div class="student-info-bar" id="quizStudentInfo"></div>
    <div class="progress-bar-container" id="progressBarContainer" style="display: none;">
      <span style="font-weight:bold;">⤴ JUMP TO QUESTION:</span>
      <div id="questionNavButtons" style="display:inline-block;"></div>
    </div>
    <form id="quizForm"></form>
    <button class="submit-btn" id="submitQuizBtn">🚀 SUBMIT TEST</button>
    <footer>Do not refresh. Auto-submit at 0:00. Honour code applies.</footer>
  </div>

  <div id="thankyouMessage" style="display: none;"></div>
</div>

<!-- Floating Timer -->
<div id="floatingTimer">60:00</div>

<script>
  // ----------------------------- GENERIC 80 QUESTIONS (GLOBAL) ---------------------------------
  // Function to build 80 generic MCQs across 8 sections (10 each)
  function buildQuestions() {
    const sections = [
      "Analytical Reasoning", "English Language", "Mathematics", "Business Aptitude",
      "Psychology", "Computer Knowledge", "Design Sense", "General Knowledge (Global)"
    ];
    let qs = [];
    let id = 0;
    // Section 0: Analytical
    for (let i=1; i<=10; i++) qs.push({ section:0, text: `Analytical Q${i}: Find the next in series: 2, 5, 10, 17, ?`, options:["24","26","28","30"], correct:0 });
    // Section 1: English
    for (let i=1; i<=10; i++) qs.push({ section:1, text: `English Q${i}: Choose the correct synonym of "Robust"`, options:["Weak","Strong","Fragile","Sickly"], correct:1 });
    // Section 2: Math
    for (let i=1; i<=10; i++) qs.push({ section:2, text: `Math Q${i}: If 15% of x = 45, then x = ?`, options:["200","250","300","350"], correct:2 });
    // Section 3: Business
    for (let i=1; i<=10; i++) qs.push({ section:3, text: `Business Q${i}: Revenue minus Cost equals?`, options:["Profit","Investment","Tax","Depreciation"], correct:0 });
    // Section 4: Psychology
    for (let i=1; i<=10; i++) qs.push({ section:4, text: `Psychology Q${i}: Which is a sign of high emotional intelligence?`, options:["Impulsivity","Empathy","Aggression","Denial"], correct:1 });
    // Section 5: Computer
    for (let i=1; i<=10; i++) qs.push({ section:5, text: `Computer Q${i}: Which device is used for output?`, options:["Mouse","Keyboard","Monitor","Scanner"], correct:2 });
    // Section 6: Design Sense
    for (let i=1; i<=10; i++) qs.push({ section:6, text: `Design Q${i}: Complementary colors create?`, options:["Harmony","Contrast","Monotony","Neutrality"], correct:1 });
    // Section 7: GK Global
    for (let i=1; i<=10; i++) qs.push({ section:7, text: `Global GK Q${i}: Who painted the Mona Lisa?`, options:["Van Gogh","Picasso","Da Vinci","Rembrandt"], correct:2 });
    return qs;
  }
  const QUESTIONS = buildQuestions();
  const SECTIONS = ["Analytical Reasoning", "English Language", "Mathematics", "Business Aptitude", "Psychology", "Computer Knowledge", "Design Sense", "General Knowledge (Global)"];

  // ----------------------------- GLOBALS ---------------------------------
  let startTime = null, timerInterval = null, quizActive = false, submitted = false;
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbykQOBxb2QxO4Hap99SbzlO4t4fhdP3QWoBf6KSoYl3cvmto5RXXuxcmeoNxUYBy1T5/exec";

  // DOM elements
  const preQuizDiv = document.getElementById('preQuizSection');
  const quizAreaDiv = document.getElementById('quizArea');
  const thankyouDiv = document.getElementById('thankyouMessage');
  const startBtn = document.getElementById('startQuizBtn');
  const submitBtn = document.getElementById('submitQuizBtn');
  const quizForm = document.getElementById('quizForm');
  const timerDisplayElem = document.getElementById('timerDisplay');
  const quizStudentInfoSpan = document.getElementById('quizStudentInfo');
  const floatingTimerDiv = document.getElementById('floatingTimer');

  // ----------------------------- PREFILL NAME/EMAIL (GUARANTEED) ---------------------------------
  function prefillFromURL() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    const email = params.get('email');
    const nameField = document.getElementById('studentName');
    const emailField = document.getElementById('studentEmail');
    if (nameField && name) nameField.value = decodeURIComponent(name);
    if (emailField && email) emailField.value = decodeURIComponent(email);
    // retry if fields not ready
    if ((!nameField || !emailField) && (name || email)) setTimeout(prefillFromURL, 100);
  }
  window.addEventListener('DOMContentLoaded', prefillFromURL);
  // also when start button clicked (in case something overwrites)
  startBtn.addEventListener('click', () => setTimeout(prefillFromURL, 10));

  // ----------------------------- RENDER QUIZ FORM ---------------------------------
  function renderQuizForm() {
    quizForm.innerHTML = '';
    for (let s = 0; s < SECTIONS.length; s++) {
      const sectionDiv = document.createElement('div');
      sectionDiv.className = 'section';
      sectionDiv.innerHTML = `<h2>${SECTIONS[s]}</h2>`;
      const sectionQuestions = QUESTIONS.filter(q => q.section === s);
      sectionQuestions.forEach((q, idx) => {
        const globalIdx = QUESTIONS.findIndex(qq => qq === q);
        const qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.innerHTML = `
          <p>${idx+1}. ${q.text}</p>
          <div class="options">
            ${q.options.map((opt, optIdx) => `
              <label>
                <input type="radio" name="q${globalIdx}" value="${optIdx}">
                ${String.fromCharCode(65+optIdx)}. ${opt}
              </label>
            `).join('')}
          </div>
        `;
        sectionDiv.appendChild(qDiv);
      });
      quizForm.appendChild(sectionDiv);
    }
  }

  // ----------------------------- PROGRESS BAR (NAV BUTTONS) ---------------------------------
  function generateNavButtons() {
    const navDiv = document.getElementById('questionNavButtons');
    if (!navDiv) return;
    navDiv.innerHTML = '';
    const questionDivs = document.querySelectorAll('.question');
    for (let i = 0; i < questionDivs.length; i++) {
      const btn = document.createElement('button');
      btn.textContent = i+1;
      btn.className = 'nav-btn';
      btn.addEventListener('click', () => {
        questionDivs[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      navDiv.appendChild(btn);
    }
    document.getElementById('progressBarContainer').style.display = 'block';
  }

  // ----------------------------- TIMER ---------------------------------
  function startTimer() {
    startTime = new Date();
    let secondsLeft = 3600;
    timerInterval = setInterval(() => {
      if (!quizActive || submitted) return;
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        timerDisplayElem.innerText = "00:00";
        if (floatingTimerDiv) floatingTimerDiv.innerText = "00:00";
        alert("Time's up! Auto-submitting.");
        submitQuiz(true);
      } else {
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        const timeStr = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        timerDisplayElem.innerText = timeStr;
        if (floatingTimerDiv) floatingTimerDiv.innerText = timeStr;
      }
    }, 1000);
  }

  function getTimeTakenMinutes() {
    if (!startTime) return 0;
    return (new Date() - startTime) / 60000;
  }

  function calculateScores() {
    let sectionScores = [0,0,0,0,0,0,0,0];
    let totalRaw = 0;
    for (let i = 0; i < QUESTIONS.length; i++) {
      const selected = document.querySelector(`input[name="q${i}"]:checked`);
      if (selected && parseInt(selected.value) === QUESTIONS[i].correct) {
        sectionScores[QUESTIONS[i].section]++;
        totalRaw++;
      }
    }
    return { sectionScores, totalRaw };
  }

  function applyPenalty(timeTaken) {
    if (timeTaken <= 62) return 0;
    return Math.min(Math.floor((timeTaken - 60) * 0.5), 10);
  }

  async function submitQuiz(isAuto = false) {
    if (submitted) return;
    submitted = true;
    quizActive = false;
    if (timerInterval) clearInterval(timerInterval);
    const timeTaken = getTimeTakenMinutes();
    const { sectionScores, totalRaw } = calculateScores();
    const penalty = applyPenalty(timeTaken);
    const finalScore = totalRaw - penalty;

    const studentName = document.getElementById('studentName').value;
    const studentDob = document.getElementById('studentDob').value;
    const studentEmail = document.getElementById('studentEmail').value;
    const studentCounselor = document.getElementById('studentCounselor').value;

    const payload = {
      studentId: studentName.replace(/\s/g,'') + Date.now(),
      studentName, email: studentEmail, dob: studentDob, counselor: studentCounselor,
      timeTaken: timeTaken.toFixed(1),
      scores: {
        analytical: sectionScores[0], english: sectionScores[1], math: sectionScores[2],
        business: sectionScores[3], psychology: sectionScores[4], computer: sectionScores[5],
        design: sectionScores[6], gk: sectionScores[7]
      },
      totalRaw, penalty, finalScore, ip: ""
    };

    // Send to Google Apps Script
    try {
      await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch(e) { console.error("Save error", e); }

    // Disable all radio buttons
    document.querySelectorAll('#quizForm input[type="radio"]').forEach(r => r.disabled = true);
    submitBtn.disabled = true;
    submitBtn.style.display = 'none';
    quizForm.style.display = 'none';
    thankyouDiv.style.display = 'block';
    thankyouDiv.innerHTML = `
      <div class="thankyou">
        <h2>✅ Mission Complete, ${studentName}!</h2>
        <p>Your responses have been saved and submitted.</p>
        <p>Please refer to your Admissions Counselor <strong>${studentCounselor}</strong> for your performance insights.</p>
        <p>Thank you for your focus. The future belongs to the curious.</p>
        <br>
        <p style="font-size:0.8rem;">You may now close this window.</p>
      </div>
    `;
    sessionStorage.removeItem('quizActive');
  }

  function startQuiz() {
    const name = document.getElementById('studentName').value.trim();
    const dob = document.getElementById('studentDob').value;
    const email = document.getElementById('studentEmail').value.trim();
    const counselor = document.getElementById('studentCounselor').value;
    if (!name || !dob || !email || !counselor) return alert("Fill all fields.");
    if (!email.includes('@')) return alert("Valid email required.");
    preQuizDiv.style.display = 'none';
    quizAreaDiv.style.display = 'block';
    renderQuizForm();
    generateNavButtons();
    quizStudentInfoSpan.innerHTML = `
      <span><strong>Student Name:</strong> ${name}</span> |
      <span><strong>Email:</strong> ${email}</span> |
      <span><strong>Counsellor:</strong> ${counselor}</span>
    `;
    quizActive = true;
    sessionStorage.setItem('quizActive', 'true');
    startTimer();
  }

  // ----------------------------- PREVENT REFRESH/CLOSE ---------------------------------
  window.addEventListener('beforeunload', (e) => {
    if (quizActive && !submitted) {
      e.preventDefault();
      e.returnValue = "Test in progress. Your answers will be lost if you leave.";
      return "Test in progress. Your answers will be lost if you leave.";
    }
  });
  window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('quizActive') === 'true') {
      sessionStorage.removeItem('quizActive');
      alert("Previous test session was interrupted. Please restart from your email link.");
      window.location.href = window.location.pathname;
    }
  });
  history.pushState(null, null, location.href);
  window.addEventListener('popstate', () => {
    if (quizActive && !submitted) {
      alert("Navigation blocked during test.");
      history.pushState(null, null, location.href);
    }
  });

  startBtn.addEventListener('click', startQuiz);
  submitBtn.addEventListener('click', () => submitQuiz(false));
  floatingTimerDiv.addEventListener('click', () => {
    floatingTimerDiv.style.opacity = floatingTimerDiv.style.opacity === '0.3' ? '1' : '0.3';
  });
</script>
</body>
</html>
